<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celenganku</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="findev1.png">
    <style>
        body {
            background: #f8fafc;
            font-family: 'Poppins', sans-serif;
        }
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }
        h1 {
            color: #198754;
            font-weight: 700;
        }
        .table thead {
            background-color: #198754;
            color: white;
        }
        .btn-success {
            background-color: #198754;
            border: none;
        }
        .btn-success:hover {
            background-color: #157347;
        }
        .btn-outline-success {
            border-color: #198754;
            color: #198754;
        }
        .btn-outline-success:hover {
            background-color: #198754;
            color: white;
        }
        .alert {
            font-size: 1.2rem;
            font-weight: 600;
        }
        @media (max-width: 576px) {
            h1 {
                font-size: 1.6rem;
            }
            .alert {
                font-size: 1rem;
                padding: 0.5rem;
            }
            .table {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container mt-4 mb-5">
        <h1 class="text-center mb-3">💰 Celenganku</h1>

        <div class="alert alert-success text-center" id="totalTabungan">
            Total Tabungan: <strong>Rp 0</strong>
        </div>

        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center mb-3">
            <button class="btn btn-success w-100 w-sm-auto" data-bs-toggle="modal" data-bs-target="#tambahModal">+ Tambah Tabungan</button>
            <button class="btn btn-outline-success w-100 w-sm-auto" id="resetData">🧹 Reset Data</button>
        </div>

        <!-- Modal Tambah Data -->
        <div class="modal fade" id="tambahModal" tabindex="-1" aria-labelledby="tambahModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
            <form id="formTambah">
                <div class="modal-header">
                    <h5 class="modal-title" id="tambahModalLabel">Tambah Tabungan</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="tanggal" class="form-label">Tanggal</label>
                        <input type="date" id="tanggal" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="keterangan" class="form-label">Keterangan</label>
                        <input type="text" id="keterangan" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="jumlah" class="form-label">Jumlah (Rp)</label>
                        <input type="number" id="jumlah" class="form-control" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-success">Simpan</button>
                </div>
            </form>
            </div>
        </div>
        </div>

        <!-- Tabel -->
        <div class="card mt-3">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered table-hover align-middle text-center" id="tabelTabungan">
                        <thead>
                            <tr>
                                <th>No</th>
                                <th>Tanggal</th>
                                <th>Keterangan</th>
                                <th>Jumlah (Rp)</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="dataBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    let dataTabungan = JSON.parse(localStorage.getItem('tabungan')) || [];

    function simpanData() {
        localStorage.setItem('tabungan', JSON.stringify(dataTabungan));
    }

    function tampilkanData() {
        const tbody = document.getElementById('dataBody');
        tbody.innerHTML = '';
        let total = 0;

        dataTabungan.forEach((item, index) => {
            total += parseInt(item.jumlah);
            tbody.innerHTML += `
                <tr>
                    <td>${index + 1}</td>
                    <td>${item.tanggal}</td>
                    <td>${item.keterangan}</td>
                    <td>${parseInt(item.jumlah).toLocaleString('id-ID')}</td>
                    <td>
                        <button class="btn btn-danger btn-sm" onclick="hapusData(${index})">Hapus</button>
                    </td>
                </tr>
            `;
        });

        document.getElementById('totalTabungan').innerHTML = `Total Tabungan: <strong>Rp ${total.toLocaleString('id-ID')}</strong>`;
    }

    document.getElementById('formTambah').addEventListener('submit', function(e) {
        e.preventDefault();

        const tanggal = document.getElementById('tanggal').value;
        const keterangan = document.getElementById('keterangan').value;
        const jumlah = document.getElementById('jumlah').value;

        const id = Date.now(); // unik
        dataTabungan.push({ id, tanggal, keterangan, jumlah });

        simpanData();
        tampilkanData();
        e.target.reset();

        const modal = bootstrap.Modal.getInstance(document.getElementById('tambahModal'));
        modal.hide();
    });

    function hapusData(index) {
        if (confirm('Yakin ingin menghapus data ini?')) {
            dataTabungan.splice(index, 1);
            simpanData();
            tampilkanData();
        }
    }

    document.getElementById('resetData').addEventListener('click', () => {
        if (confirm('Yakin ingin menghapus semua data tabungan?')) {
            localStorage.removeItem('tabungan');
            dataTabungan = [];
            tampilkanData();
        }
    });

    tampilkanData();
    </script>
</body>
</html>

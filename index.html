<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Celenganku Pro - Financial Insights</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary-color: #198754;
      --secondary-color: #20c997;
      --bg-light: #f8fafc;
    }
    body { background: var(--bg-light); font-family: 'Poppins', sans-serif; color: #334155; }
    .container { max-width: 1000px; }
    
    /* Card Glassmorphism Style */
    .saldo-card { 
      background: linear-gradient(135deg, #198754 0%, #28a745 100%); 
      color: white; border: none; border-radius: 24px; padding: 30px; 
      box-shadow: 0 20px 25px -5px rgba(25, 135, 84, 0.2);
    }

    .nav-pills .nav-link { 
      border-radius: 12px; color: #64748b; font-weight: 500; 
      padding: 12px 20px; transition: all 0.3s ease;
    }
    .nav-pills .nav-link.active { 
      background-color: var(--primary-color); 
      box-shadow: 0 4px 12px rgba(25, 135, 84, 0.3);
    }

    .card-custom { 
      border: none; border-radius: 20px; 
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .search-input {
      border-radius: 10px; border: 1px solid #e2e8f0; padding-left: 40px;
    }

    /* Chart Container */
    .chart-container { position: relative; height: 250px; width: 100%; }

    .btn-action { border-radius: 12px; font-weight: 500; padding: 10px 20px; }

    /* Mobile Table Optimization */
    .table-mobile { display: none; }
    @media (max-width: 767px) {
      .table-responsive { display: none; }
      .table-mobile { display: grid; gap: 12px; }
      .nav-pills { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 5px; }
    }
  </style>
</head>
<body>

<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 fw-bold mb-0">💰 Celenganku<span class="text-success">Pro</span></h1>
    <div class="dropdown">
      <button class="btn btn-light btn-sm rounded-pill shadow-sm px-3 dropdown-toggle" data-bs-toggle="dropdown">Opsi Data</button>
      <ul class="dropdown-menu dropdown-menu-end shadow border-0">
        <li><a class="dropdown-item" href="#" onclick="backupData()">📤 Ekspor JSON</a></li>
        <li><a class="dropdown-item" href="#" onclick="triggerRestore()">📥 Impor JSON</a></li>
        <li><hr class="dropdown-divider"></li>
        <li><a class="dropdown-item text-danger" href="#" id="resetData">⚠️ Reset Semua</a></li>
      </ul>
    </div>
  </div>

  <div class="row g-4 mb-4">
    <div class="col-lg-7">
      <div class="saldo-card shadow h-100 d-flex flex-column justify-content-center">
        <small class="opacity-75 text-uppercase tracking-wider fw-medium">Kekayaan Bersih Anda</small>
        <h2 class="display-5 fw-bold my-2" id="totalSemuaAset">Rp 0</h2>
        <div class="mt-3 p-3 rounded-4 bg-white bg-opacity-10">
          <div class="row text-center g-2" id="infoDetailAset">
            </div>
        </div>
      </div>
    </div>
    
    <div class="col-lg-5">
      <div class="card card-custom h-100 p-3">
        <h6 class="fw-bold mb-3 text-center">Alokasi Aset</h6>
        <div class="chart-container">
          <canvas id="assetChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" style="display: none;" onchange="restoreData(event)">

  <div class="row g-3 align-items-center mb-4">
    <div class="col-md-7">
      <ul class="nav nav-pills bg-white p-2 rounded-4 shadow-sm" id="pills-tab">
        <li class="nav-item"><button class="nav-link active" onclick="gantiKategori('Tunai')">💵 Tunai</button></li>
        <li class="nav-item"><button class="nav-link" onclick="gantiKategori('Rekening')">🏦 Bank</button></li>
        <li class="nav-item"><button class="nav-link" onclick="gantiKategori('Emas')">✨ Emas</button></li>
        <li class="nav-item"><button class="nav-link" onclick="gantiKategori('Investasi')">📈 Saham</button></li>
      </ul>
    </div>
    <div class="col-md-5 d-flex gap-2">
      <div class="position-relative flex-grow-1">
        <input type="text" id="searchInput" class="form-control search-input" placeholder="Cari riwayat..." onkeyup="renderTampilan()">
      </div>
      <button class="btn btn-success btn-action" data-bs-toggle="modal" data-bs-target="#modalAset" onclick="setMode('tambah')">
        Tambah
      </button>
    </div>
  </div>

  <div class="card card-custom p-3 mb-4">
    <div class="row g-2">
      <div class="col-6 col-md-3">
        <select id="filterBulan" class="form-select border-0 bg-light rounded-3" onchange="renderTampilan()"></select>
      </div>
      <div class="col-6 col-md-3">
        <select id="filterTahun" class="form-select border-0 bg-light rounded-3" onchange="renderTampilan()"></select>
      </div>
      <div class="col-12 col-md-6 text-md-end pt-2">
        <small class="text-muted" id="totalPeriodeText">Total Periode: Rp 0</small>
      </div>
    </div>
  </div>

  <div class="card card-custom p-4">
    <h5 class="fw-bold mb-4">Riwayat <span id="labelJudul" class="text-success">Tunai</span></h5>
    <div id="emptyState" class="text-center py-5 d-none">
      <img src="https://cdn-icons-png.flaticon.com/512/7486/7486744.png" width="80" class="opacity-25 mb-3">
      <p class="text-muted">Wah, belum ada catatan di sini.</p>
    </div>
    
    <div class="table-responsive">
      <table class="table table-hover align-middle custom-table">
        <thead class="text-muted small text-uppercase">
          <tr>
            <th>No</th>
            <th>Tanggal</th>
            <th>Keterangan</th>
            <th>Nilai</th>
            <th class="text-center">Aksi</th>
          </tr>
        </thead>
        <tbody id="dataBody" class="fw-medium"></tbody>
      </table>
    </div>
    <div class="table-mobile" id="dataMobile"></div>
  </div>
</div>

<div class="modal fade" id="modalAset" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow" style="border-radius: 24px;">
      <form id="formAset">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-bold w-100 text-center" id="modalTitle">Tambah Data</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <input type="hidden" id="editId">
          <div class="mb-3">
            <label class="form-label small fw-bold">Tanggal</label>
            <input type="date" id="tanggal" class="form-control rounded-3" required>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Keterangan</label>
            <input type="text" id="keterangan" class="form-control rounded-3" placeholder="Contoh: Gaji Maret" required>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Jumlah (Rp)</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0 rounded-start-3">Rp</span>
              <input type="number" id="jumlah" class="form-control rounded-end-3" placeholder="0" required>
            </div>
          </div>
        </div>
        <div class="modal-footer border-0 pt-0 p-4">
          <button type="submit" class="btn btn-success w-100 py-3 rounded-4 shadow" id="btnSimpan">Simpan</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let dataAset = JSON.parse(localStorage.getItem('dataAset')) || [];
  let kategoriAktif = 'Tunai';
  let mode = 'tambah';
  let myChart = null;

  const bulanIndo = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

  function updateChart(totals) {
    const ctx = document.getElementById('assetChart').getContext('2d');
    const dataValues = [totals.Tunai, totals.Rekening, totals.Emas, totals.Investasi];
    
    if (myChart) myChart.destroy();
    
    myChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Tunai', 'Bank', 'Emas', 'Investasi'],
        datasets: [{
          data: dataValues,
          backgroundColor: ['#198754', '#0dcaf0', '#ffc107', '#0d6efd'],
          borderWidth: 0,
          hoverOffset: 10
        }]
      },
      options: {
        plugins: { legend: { display: false } },
        cutout: '70%',
        responsive: true,
        maintainAspectRatio: false
      }
    });
  }

  function gantiKategori(kat) {
    kategoriAktif = kat;
    document.querySelectorAll('.nav-link').forEach(btn => {
      btn.classList.remove('active');
      if(btn.innerText.includes(kat)) btn.classList.add('active');
    });
    document.getElementById('labelJudul').innerText = kat;
    renderTampilan();
  }

  function setMode(newMode, id = null) {
    mode = newMode;
    const form = document.getElementById('formAset');
    if (mode === 'tambah') {
      form.reset();
      document.getElementById('tanggal').valueAsDate = new Date();
      document.getElementById('modalTitle').innerText = `Tambah ${kategoriAktif}`;
    } else {
      const data = dataAset.find(i => i.id === id);
      document.getElementById('editId').value = data.id;
      document.getElementById('tanggal').value = data.tanggal;
      document.getElementById('keterangan').value = data.keterangan;
      document.getElementById('jumlah').value = data.jumlah;
      document.getElementById('modalTitle').innerText = `Edit ${data.kategori}`;
    }
  }

  function renderTampilan() {
    const tbody = document.getElementById('dataBody');
    const mobileView = document.getElementById('dataMobile');
    const fBlan = document.getElementById('filterBulan').value;
    const fThun = document.getElementById('filterTahun').value;
    const q = document.getElementById('searchInput').value.toLowerCase();

    tbody.innerHTML = ''; mobileView.innerHTML = '';

    // Hitung Saldo & Chart
    let totals = { Tunai: 0, Rekening: 0, Emas: 0, Investasi: 0 };
    dataAset.forEach(item => { if(totals.hasOwnProperty(item.kategori)) totals[item.kategori] += parseInt(item.jumlah); });
    
    const netWorth = Object.values(totals).reduce((a, b) => a + b, 0);
    document.getElementById('totalSemuaAset').innerText = `Rp ${netWorth.toLocaleString('id-ID')}`;
    
    document.getElementById('infoDetailAset').innerHTML = `
      <div class="col-3 border-end border-white border-opacity-25"><small>💵</small><br><b>${(totals.Tunai/1000).toFixed(0)}k</b></div>
      <div class="col-3 border-end border-white border-opacity-25"><small>🏦</small><br><b>${(totals.Rekening/1000).toFixed(0)}k</b></div>
      <div class="col-3 border-end border-white border-opacity-25"><small>✨</small><br><b>${(totals.Emas/1000).toFixed(0)}k</b></div>
      <div class="col-3"><small>📈</small><br><b>${(totals.Investasi/1000).toFixed(0)}k</b></div>
    `;

    updateChart(totals);

    // Filter & Render Tabel
    let filtered = dataAset.filter(item => {
      const d = new Date(item.tanggal);
      return item.kategori === kategoriAktif && 
             (fBlan === 'all' || d.getMonth().toString() === fBlan) && 
             (fThun === 'all' || d.getFullYear().toString() === fThun) &&
             (item.keterangan.toLowerCase().includes(q));
    });

    let totalPeriode = 0;
    filtered.sort((a,b) => new Date(b.tanggal) - new Date(a.tanggal));

    if(filtered.length === 0) {
      document.getElementById('emptyState').classList.remove('d-none');
    } else {
      document.getElementById('emptyState').classList.add('d-none');
      filtered.forEach((item, idx) => {
        totalPeriode += parseInt(item.jumlah);
        const fmt = parseInt(item.jumlah).toLocaleString('id-ID');
        tbody.innerHTML += `<tr>
          <td>${idx+1}</td>
          <td>${item.tanggal}</td>
          <td>${item.keterangan}</td>
          <td class="text-success fw-bold">Rp ${fmt}</td>
          <td class="text-center">
            <button class="btn btn-sm btn-light text-warning" onclick="setMode('edit', ${item.id})" data-bs-toggle="modal" data-bs-target="#modalAset">Edit</button>
            <button class="btn btn-sm btn-light text-danger" onclick="hapusData(${item.id})">Hapus</button>
          </td>
        </tr>`;
        
        mobileView.innerHTML += `<div class="card card-custom p-3 border-start border-4 border-success">
          <div class="d-flex justify-content-between"><b>${item.keterangan}</b> <small>${item.tanggal}</small></div>
          <div class="text-success fw-bold mt-1">Rp ${fmt}</div>
          <div class="mt-2 text-end">
            <span class="text-warning me-3" onclick="setMode('edit', ${item.id})" data-bs-toggle="modal" data-bs-target="#modalAset">Edit</span>
            <span class="text-danger" onclick="hapusData(${item.id})">Hapus</span>
          </div>
        </div>`;
      });
    }
    document.getElementById('totalPeriodeText').innerText = `Total Periode Ini: Rp ${totalPeriode.toLocaleString('id-ID')}`;
  }

  // --- LOGIKA CRUD, BACKUP, RESTORE (Sama seperti sebelumnya dengan sedikit perapihan) ---
  document.getElementById('formAset').addEventListener('submit', e => {
    e.preventDefault();
    const id = mode === 'edit' ? parseInt(document.getElementById('editId').value) : Date.now();
    const payload = {
      id: id,
      kategori: mode === 'edit' ? dataAset.find(i => i.id === id).kategori : kategoriAktif,
      tanggal: document.getElementById('tanggal').value,
      keterangan: document.getElementById('keterangan').value,
      jumlah: document.getElementById('jumlah').value
    };

    if (mode === 'tambah') dataAset.push(payload);
    else dataAset[dataAset.findIndex(i => i.id === id)] = payload;

    localStorage.setItem('dataAset', JSON.stringify(dataAset));
    renderTampilan();
    bootstrap.Modal.getInstance(document.getElementById('modalAset')).hide();
  });

  function hapusData(id) {
    if(confirm('Hapus data ini?')) {
      dataAset = dataAset.filter(i => i.id !== id);
      localStorage.setItem('dataAset', JSON.stringify(dataAset));
      renderTampilan();
    }
  }

  function backupData() {
    const dataStr = JSON.stringify(dataAset, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `Celenganku_Backup_${new Date().toISOString().split('T')[0]}.json`;
    a.click();
  }

  function triggerRestore() { document.getElementById('fileInput').click(); }
  
  function restoreData(e) {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = (ev) => {
      dataAset = JSON.parse(ev.target.result);
      localStorage.setItem('dataAset', JSON.stringify(dataAset));
      renderTampilan();
      alert('Data Berhasil Dipulihkan!');
    };
    reader.readAsText(file);
  }

  document.getElementById('resetData').addEventListener('click', () => {
    if(confirm('SEMUA data akan dihapus permanen!')) {
      dataAset = []; localStorage.removeItem('dataAset'); renderTampilan();
    }
  });

  function init() {
    const fb = document.getElementById('filterBulan');
    fb.innerHTML = '<option value="all">Semua Bulan</option>';
    bulanIndo.forEach((b, i) => fb.innerHTML += `<option value="${i}">${b}</option>`);

    const ft = document.getElementById('filterTahun');
    ft.innerHTML = '<option value="all">Semua Tahun</option>';
    for(let i=2025; i<=2035; i++) ft.innerHTML += `<option value="${i}">${i}</option>`;

    const n = new Date();
    fb.value = n.getMonth();
    ft.value = n.getFullYear();
    renderTampilan();
  }

  init();
</script>
</body>
</html>
